name: "✨ Feature Request"
description: Propose a new feature or enhancement
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Share your feature idea! Help us understand the problem you're solving and how your proposal addresses it.

  - type: textarea
    id: problem_statement
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Who needs it?
      placeholder: |
        Currently, users cannot [do X]. This makes [Y task] difficult because [reason].

  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed Solution
      description: How should this feature work?
      placeholder: |
        Add a new \`/api/endpoint\` that allows users to [action]. It should:
        - Take input [X]
        - Return response [Y]
        - Handle errors [Z]

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider?

  - type: checkboxes
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: Define how we'll know this feature is complete
      options:
        - label: "[ ] Write tests covering the happy path"
        - label: "[ ] Write tests covering error cases"
        - label: "[ ] Implement the feature"
        - label: "[ ] Update documentation"
        - label: "[ ] Get code review approval"

  - type: textarea
    id: technical_context
    attributes:
      label: "🤖 Technical Context"
      description: |
        **For AI agents:** Record architectural decisions, affected files, dependencies, and implementation notes here.
        Do NOT delete this section—leave it if you cannot populate it.
      placeholder: |
        - Architecture: [describe approach]
        - Affected files: [list modules/files]
        - Dependencies: [new packages, existing libraries]
        - Implementation strategy: [outline steps]
        - Trade-offs: [discuss design decisions]

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched for similar feature requests
        - label: This aligns with project goals
        - label: I am willing to help implement this
